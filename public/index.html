<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa de territorios</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  * { box-sizing: border-box; }
  html,body{ margin:0; height:100%; }
  :root{
    --ink:#16202c; --muted:#64748b; --line:#e6eaf0; --panel:#ffffff; --bg:#eef1f6; --soft:#f5f8fb;
    --brand:#00A8D8; --accent:#0883A8; --on-accent:#ffffff;   /* cyan SALBOM */
  }
  :root[data-theme="dark"]{
    --ink:#e7eef6; --muted:#93a4b8; --line:#243140; --panel:#101a26; --bg:#0a121b; --soft:#18232f;
    --brand:#27bdec; --accent:#0e91bc; --on-accent:#ffffff;
  }
  #app{ position:absolute; inset:0; display:flex; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); overflow:hidden; }
  #panel{ width:330px; flex:0 0 330px; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0; }
  #map{ flex:1 1 auto; min-width:0; background:var(--bg); }
  .pad{ padding:16px 18px; }
  .head{ border-bottom:1px solid var(--line); }
  .title{ font-size:17px; font-weight:680; letter-spacing:-.01em; margin:0; }
  .sub{ font-size:12.5px; color:var(--muted); margin:3px 0 0; line-height:1.4; }
  .scroll{ overflow-y:auto; min-height:0; flex:1 1 auto; }
  .label{ font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:0 0 9px; }
  .label.mt{ margin-top:16px; }
  .seg{ display:flex; background:var(--soft); border:1px solid var(--line); border-radius:9px; padding:3px; gap:3px; }
  .seg button{ flex:1; border:0; background:transparent; padding:7px 8px; border-radius:7px; cursor:pointer; font-size:12.5px; font-weight:600; color:var(--muted); transition:all .12s; }
  .seg button.on{ background:var(--accent); color:var(--on-accent); box-shadow:0 1px 2px rgba(8,131,168,.28); }
  .masters{ display:flex; gap:8px; margin-top:14px; }
  .chip{ flex:1; display:flex; align-items:center; justify-content:center; gap:7px; cursor:pointer; user-select:none; border:1px solid var(--line); border-radius:8px; padding:8px; font-size:12.5px; font-weight:600; background:var(--soft); color:var(--ink); }
  .chip input{ accent-color:var(--brand); }
  .search{ width:100%; margin-top:14px; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:13px; outline:none; background:var(--panel); color:var(--ink); }
  .search::placeholder{ color:var(--muted); }
  .search:focus{ border-color:var(--brand); }
  .grouphdr{ font-size:11px; font-weight:700; letter-spacing:.04em; color:var(--muted); margin:16px 0 7px; display:flex; align-items:center; gap:8px;}
  .grouphdr .gl{ flex:1; height:1px; background:var(--line); }
  .row{ display:flex; align-items:center; gap:10px; padding:8px 9px; border-radius:8px; cursor:pointer; }
  .row:hover{ background:var(--soft); }
  .row input{ width:15px; height:15px; cursor:pointer; }
  .sw{ width:13px; height:13px; border-radius:4px; flex:0 0 13px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.08); }
  .row .nm{ flex:1; font-size:13px; font-weight:550; }
  .row .ct{ font-size:11.5px; color:var(--muted); font-variant-numeric:tabular-nums; background:var(--soft); padding:1px 7px; border-radius:20px; }
  .row.zona .nm{ font-weight:650; }
  .foot{ border-top:1px solid var(--line); font-size:11.5px; color:var(--muted); line-height:1.5; }
  .countbar{ border-top:1px solid var(--line); padding:11px 18px; font-size:12.5px; font-weight:600; display:flex; justify-content:space-between; align-items:center; background:var(--soft); }
  .countbar b{ font-variant-numeric:tabular-nums; }
  .leaflet-popup-content{ font-family:inherit; margin:11px 13px; }
  .pop b{ font-size:13px; } .pop span{ display:block; font-size:12px; color:var(--muted); margin-top:2px; }
  .pop a{ display:inline-block; margin-top:8px; font-size:12px; font-weight:600; color:#1d4ed8; text-decoration:none; }
  .pop a:hover{ text-decoration:underline; }
  .pdot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  /* En desktop, el botón flotante y el fondo oscuro no existen */
  #panelToggle{ display:none; }
  #scrim{ display:none; }
  /* ---- Mobile: mapa a pantalla completa, panel como cajón deslizante ---- */
  @media (max-width:768px){
    #panel{
      position:fixed; top:0; left:0; height:100dvh;
      width:min(86vw,360px); max-height:none; flex:none;
      border-right:1px solid var(--line); border-bottom:0;
      transform:translateX(-100%); transition:transform .25s ease;
      z-index:1200; box-shadow:0 0 40px rgba(0,0,0,.28);
    }
    body.panel-open #panel{ transform:none; }
    #map{ position:absolute; inset:0; }
    #panelToggle{
      display:flex; align-items:center; justify-content:center; gap:8px;
      position:fixed; top:12px; right:12px; z-index:1300;
      height:42px; padding:0 15px; border:1px solid var(--line); border-radius:11px;
      background:var(--panel); color:var(--ink); font-size:13px; font-weight:650;
      box-shadow:0 2px 12px rgba(0,0,0,.2); cursor:pointer;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }
    #scrim{
      display:block; position:fixed; inset:0; background:rgba(10,18,27,.45);
      opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:1100;
    }
    body.panel-open #scrim{ opacity:1; pointer-events:auto; }
    /* el modal de Street View por encima de todo */
    #svModal{ z-index:1500; }
  }
  .pop .svbtn{ display:block; width:100%; margin-top:9px; padding:7px 10px; border:0; border-radius:7px; background:var(--accent); color:var(--on-accent); font-size:12px; font-weight:600; cursor:pointer; }
  .pop .svbtn:hover{ opacity:.92; }
  #svModal{ position:absolute; inset:0; background:rgba(15,23,42,.55); display:none; align-items:center; justify-content:center; z-index:1000; }
  #svCard{ width:min(880px,92vw); height:min(560px,82vh); background:var(--panel); border-radius:14px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.35); display:flex; flex-direction:column; }
  #svHead{ display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line); }
  #svHead b{ font-size:14px; flex:1; color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #svHead a{ font-size:12.5px; font-weight:600; color:#1d4ed8; text-decoration:none; }
  #svClose{ border:0; background:var(--soft); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:16px; line-height:1; color:var(--ink); }
  #svFrame{ flex:1; width:100%; border:0; }
  .head{ position:relative; }
  #brand{ max-width:205px; max-height:40px; display:block; margin-bottom:11px; }
  #themeBtn{ position:absolute; top:14px; right:16px; width:32px; height:32px; border:1px solid var(--line);
    background:var(--soft); color:var(--ink); border-radius:9px; cursor:pointer; font-size:15px; line-height:1; }
  #themeBtn:hover{ border-color:var(--brand); }
</style>
</head>
<body>
<div id="app">
  <div id="panel">
    <div class="pad head">
      <button id="themeBtn" title="Cambiar modo claro/oscuro">☾</button>
      <img id="brand" src="./logo-dark.png" alt="SALBOM" onerror="this.style.display='none'">
      <p class="title">Mapa de territorios</p>
      <p class="sub">Clientes y zonas de venta &middot; Argentina</p>
    </div>
    <div class="pad" style="border-bottom:1px solid var(--line)">
      <p class="label">Dataset</p>
      <div class="seg" id="datasetSeg">
        <button data-dataset="clientes" class="on">Clientes</button>
        <button data-dataset="competencia">Competencia</button>
      </div>
      <p class="label mt">Mapa base</p>
      <div class="seg" id="baseSeg">
        <button data-base="claro" class="on">Claro</button>
        <button data-base="detallado">Detallado</button>
        <button data-base="satelite">Sat&eacute;lite</button>
      </div>
      <p class="label mt">Colorear por</p>
      <div class="seg" id="seg">
        <button data-mode="zona" class="on">Zona</button>
        <button data-mode="vendedor">Vendedor</button>
      </div>
      <div class="masters">
        <label class="chip"><input type="checkbox" id="mProv" checked> Provincias</label>
        <label class="chip"><input type="checkbox" id="mCli" checked> Clientes</label>
      </div>
      <input class="search" id="search" placeholder="Buscar cliente&hellip;" autocomplete="off">
    </div>
    <div class="scroll pad" id="list"></div>
    <div class="countbar"><span id="countbarLabel">Clientes visibles</span><b id="count">0</b></div>
    <div class="pad foot">Zoom para ver calles y pueblos &middot; clic en un cliente para acercarte.</div>
  </div>
  <div id="map"></div>
</div>

  <div id="svModal">
    <div id="svCard">
      <div id="svHead">
        <b id="svTitle">Street View</b>
        <a id="svOpen" href="#" target="_blank" rel="noopener">Abrir en Google Maps &#8599;</a>
        <button id="svClose" title="Cerrar">&times;</button>
      </div>
      <iframe id="svFrame" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>

  <button id="panelToggle" aria-label="Abrir filtros"><span aria-hidden="true">☰</span> Filtros</button>
  <div id="scrim"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    const groups = groupField==="vendedor" ? d.vendedores : d.marcas;
    const groupColors = {};
    Object.keys(groups).sort().forEach((g,i)=> groupColors[g]=VEND_PALETTE[i%VEND_PALETTE.length]);
    return {
      items: d.clients, groups, groupColors, groupField, groupLabel,
      zonaOrder: Object.keys(d.zonas), prov2zona: d.prov2zona||{}
    };
  }
  const DATASETS = { clientes: buildDataset(DATA, "vendedor", "Vendedor") };
  if (COMP_DATA) DATASETS.competencia = buildDataset(COMP_DATA, "marca", "Marca");

  const P2Z=DATASETS.clientes.prov2zona;         // provincia -> zona (fondo del polígono, igual en ambos datasets)
  // Zona de cada polígono: la del propio feature (partidos de AMBA) o, si no la
  // trae, la de la provincia (P2Z). Cubre provincias, CABA y los 40 partidos.
  const FEAT_ZONA={};
  GEO.features.forEach(f=>{ const n=f.properties.name; FEAT_ZONA[n]=f.properties.zona||P2Z[n]||"Sin zona"; });
  const groupsByZona=(ds,z)=>Object.keys(ds.groups).filter(g=>ds.groups[g].zona===z);

  let datasetKey="clientes";
  let DS=DATASETS[datasetKey];
  let mode="zona";
  let activeZonas=new Set(DS.zonaOrder);         // filtro en modo Zona
  let activeGroups=new Set(Object.keys(DS.groups)); // filtro en modo Vendedor/Marca
  let showProv=true, showCli=true, q="";

  // Color de un punto: por su zona (modo Zona) o por su grupo (vendedor/marca).
  const cliColor=c=> (mode==="zona" ? (ZONA_COLORS[c.zona]||"#94a3b8") : (DS.groupColors[c[DS.groupField]]||"#94a3b8"));
  // El POLÍGONO de provincia/partido se pinta SIEMPRE por su zona (es lo geográfico).
  const polyColor=name=> (ZONA_COLORS[FEAT_ZONA[name]]||"#94a3b8");
  // Visibilidad de un polígono: por la zona a la que pertenece.
  const provVisible=name=> activeZonas.has(FEAT_ZONA[name]);
  // Visibilidad de un punto: por zona (modo Zona) o por grupo (modo Vendedor/Marca).
  const cliVisible=c=> (mode==="zona" ? activeZonas.has(c.zona) : activeGroups.has(c[DS.groupField])) && (!q || c.name.toLowerCase().includes(q));

  const map=L.map("map",{zoomControl:true}).setView([-40,-63],4);

  // ---- Responsive: cajón del panel en mobile + redibujado del mapa ----
  const panelToggle=document.getElementById("panelToggle"), scrim=document.getElementById("scrim");
  function setPanel(open){
    document.body.classList.toggle("panel-open", open);
    panelToggle.innerHTML = open ? '<span aria-hidden="true">✕</span> Cerrar'
                                 : '<span aria-hidden="true">☰</span> Filtros';
    panelToggle.setAttribute("aria-label", open ? "Cerrar filtros" : "Abrir filtros");
  }
  panelToggle.onclick=()=> setPanel(!document.body.classList.contains("panel-open"));
  scrim.onclick=()=> setPanel(false);
  // Cuando cambia el tamaño/orientación, Leaflet necesita recalcular su tamaño.
  let rsz; addEventListener("resize", ()=>{ clearTimeout(rsz); rsz=setTimeout(()=>map.invalidateSize(),200); });
  setTimeout(()=>map.invalidateSize(),250);
  const bases={
    claro: L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{subdomains:"abcd",maxZoom:19,attribution:"© OpenStreetMap, © CARTO"}),
    detallado: L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{subdomains:"abc",maxZoom:19,attribution:"© OpenStreetMap"}),
    satelite: L.layerGroup([
      L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"© Esri"}),
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png",{subdomains:"abcd",maxZoom:19,attribution:""})
    ])
  };
  let currentBase=bases.claro; currentBase.addTo(map);
  function setBase(k){ map.removeLayer(currentBase); currentBase=bases[k]; currentBase.addTo(map); }

  const provLayers={};
  const provLayer=L.geoJSON(GEO,{
    style:f=>provStyle(f.properties.name),
    onEachFeature:(f,layer)=>{
      const n=f.properties.name; provLayers[n]=layer;
      layer.bindTooltip(n+(FEAT_ZONA[n]?" · "+FEAT_ZONA[n]:""),{sticky:true});
      // Clic en la provincia -> acercar y centrar esa zona
      layer.on("click",()=>{ try{ map.flyToBounds(layer.getBounds(),{padding:[40,40],maxZoom:9,duration:.6}); }catch(e){} });
    }
  }).addTo(map);
  try{ map.fitBounds(provLayer.getBounds(),{padding:[12,12]}); }catch(e){}

  function fillByZoom(){ const z=map.getZoom(); return z>=10?0.07:z>=8?0.18:z>=6?0.38:0.55; }
  function provStyle(name){
    if(!(showProv&&provVisible(name))) return {fillOpacity:0,opacity:0,weight:0};
    return { color:"#ffffff", weight:1, fillColor:polyColor(name), fillOpacity:fillByZoom(), opacity:0.9 };
  }
  map.on("zoomend",()=>{ Object.keys(provLayers).forEach(n=>provLayers[n].setStyle(provStyle(n))); });

  const cliLayer=L.layerGroup().addTo(map);
  function popupFor(c){
    const groupVal=c[DS.groupField];
    const groupDot='<span class="pdot" style="background:'+(DS.groupColors[groupVal]||"#94a3b8")+'"></span>'+groupVal;
    let extra='';
    if(datasetKey==="competencia"){
      if(c.tipo) extra+='<span>'+esc(c.tipo)+'</span>';
      if(c.telefono) extra+='<span>Tel: '+esc(c.telefono)+'</span>';
      if(c.web) extra+='<span>'+esc(c.web)+'</span>';
      if(c.multimarca) extra+='<span>Multimarca</span>';
    }
    return '<div class="pop"><b>'+esc(c.name)+'</b>'+
      '<span>'+groupDot+'</span>'+
      '<span>'+(c.direccion?esc(c.direccion)+' · ':'')+esc(c.provincia)+' · Zona '+esc(c.zona)+'</span>'+
      extra+
      '<button class="svbtn" data-lat="'+c.lat+'" data-lng="'+c.lng+'" data-name="'+esc(c.name)+'">Ver Street View</button>'+
      '<a href="https://www.google.com/maps?q='+c.lat+','+c.lng+'" target="_blank" rel="noopener">Abrir en Google Maps ↗</a></div>';
  }
  function renderClients(){
    cliLayer.clearLayers();
    if(!showCli) return;
    DS.items.filter(cliVisible).forEach(c=>{
      const m=L.circleMarker([c.lat,c.lng],{radius:6,color:"#fff",weight:1.5,fillColor:cliColor(c),fillOpacity:1});
      m.bindPopup(popupFor(c));
      m.on("click",()=> map.flyTo([c.lat,c.lng], Math.max(map.getZoom(),16),{duration:.6}) );
      m.addTo(cliLayer);
    });
  }

  function countByGroup(g){return DS.items.filter(c=>c[DS.groupField]===g).length;}
  function countByZona(z){return DS.items.filter(c=>c.zona===z).length;}
  function rowEl(o){
    const r=document.createElement("label"); r.className=o.cls;
    const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=o.checked; cb.indeterminate=o.indet; cb.onchange=o.onToggle;
    const sw=document.createElement("span"); sw.className="sw"; sw.style.background=o.color;
    const nm=document.createElement("span"); nm.className="nm"; nm.textContent=o.name;
    const ct=document.createElement("span"); ct.className="ct"; ct.textContent=o.count;
    r.append(cb,sw,nm,ct); return r;
  }
  function renderList(){
    const el=document.getElementById("list"); el.innerHTML="";
    if(mode==="zona"){
      DS.zonaOrder.forEach(z=>{
        el.appendChild(rowEl({cls:"row zona",color:ZONA_COLORS[z],name:z,count:countByZona(z),
          checked:activeZonas.has(z),indet:false,
          onToggle:()=>{ activeZonas.has(z)?activeZonas.delete(z):activeZonas.add(z); refresh(); }}));
      });
    } else {
      DS.zonaOrder.forEach(z=>{
        const gs=groupsByZona(DS,z); if(!gs.length) return;
        const h=document.createElement("div"); h.className="grouphdr";
        h.innerHTML='<span class="sw" style="background:'+ZONA_COLORS[z]+'"></span>'+z+'<span class="gl"></span>';
        el.appendChild(h);
        gs.forEach(g=> el.appendChild(rowEl({cls:"row",color:DS.groupColors[g],name:g,count:countByGroup(g),
          checked:activeGroups.has(g),indet:false,
          onToggle:()=>{ activeGroups.has(g)?activeGroups.delete(g):activeGroups.add(g); refresh(); }})));
      });
    }
  }
  function refresh(){
    Object.keys(provLayers).forEach(n=>provLayers[n].setStyle(provStyle(n)));
    renderClients(); renderList();
    document.getElementById("count").textContent = DS.items.filter(cliVisible).length+" / "+DS.items.length;
  }

  document.querySelectorAll("#baseSeg button").forEach(b=>{ b.onclick=()=>{
    document.querySelectorAll("#baseSeg button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); setBase(b.dataset.base);
  };});
  document.querySelectorAll("#seg button").forEach(b=>{ b.onclick=()=>{
    document.querySelectorAll("#seg button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); mode=b.dataset.mode; refresh();
  };});
  document.querySelectorAll("#datasetSeg button").forEach(b=>{ b.onclick=()=>{
    const key=b.dataset.dataset;
    if(key==="competencia" && !DATASETS.competencia){
      document.getElementById("list").innerHTML='<p style="padding:8px 0;font-size:13px;color:var(--muted)">No se encontró <b>competencia.json</b>. Corré <code>export_competencia_json.py</code> en scraping_competencia y recargá la página.</p>';
      return;
    }
    document.querySelectorAll("#datasetSeg button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    datasetKey=key; DS=DATASETS[key];
    document.querySelector('#seg button[data-mode="vendedor"]').textContent = DS.groupLabel;
    document.getElementById("countbarLabel").textContent = key==="clientes"?"Clientes visibles":"Puntos visibles";
    mode="zona"; activeZonas=new Set(DS.zonaOrder); activeGroups=new Set(Object.keys(DS.groups));
    refresh();
  };});
  document.getElementById("mProv").onchange=e=>{showProv=e.target.checked; refresh();};
  document.getElementById("mCli").onchange =e=>{showCli=e.target.checked; refresh();};
  document.getElementById("search").oninput=e=>{q=e.target.value.trim().toLowerCase(); refresh();};

  refresh();
})();
</script>
</body>
</html>
